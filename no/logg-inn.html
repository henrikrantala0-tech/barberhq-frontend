<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarberHQ — Logg inn</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/dist/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;font-family:'Inter',-apple-system,system-ui,sans-serif;color:#fff;min-height:100dvh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

/* ── Nav ── */
.nav{background:rgba(10,10,10,.9);backdrop-filter:blur(14px);border-bottom:1px solid #1f1f1f;position:sticky;top:0;z-index:50}
.nav-wrap{max-width:1100px;margin:0 auto;padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:800;letter-spacing:-.03em;color:#fff}

/* ── Login-senter ── */
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{width:100%;max-width:400px;background:#0e0e0e;border:1px solid #1f1f1f;border-radius:20px;padding:36px 32px}

.card-logo{font-size:22px;font-weight:800;letter-spacing:-.03em;color:#fff;display:block;margin-bottom:20px;text-align:center}
.card h1{font-family:'Fraunces',serif;font-size:24px;font-weight:600;letter-spacing:-.025em;margin-bottom:4px;text-align:center}
.card-sub{color:#9a9a9a;font-size:13.5px;text-align:center;margin-bottom:28px}

/* ── Felter ── */
.field{margin-bottom:14px;text-align:left}
.field label{display:block;font-size:12.5px;color:#bdbdbd;font-weight:500;margin-bottom:7px}
.field input{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:10px;padding:13px 15px;color:#fff;font:inherit;font-size:15px;outline:none;transition:border-color .18s;-webkit-appearance:none}
.field input:focus{border-color:#4d8bff}
.field input::placeholder{color:#555}

/* Passord-wrapper med øye-ikon */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#666;padding:4px;display:flex;align-items:center;transition:color .15s;line-height:0}
.pw-toggle:hover{color:#bbb}
.pw-toggle svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── Feilmelding ── */
.error{color:#c0594a;font-size:13.5px;margin-bottom:12px;text-align:center;display:none}
.error.show{display:block}

/* ── Knapp ── */
.btn-login{width:100%;background:#4d8bff;color:#fff;border:none;border-radius:10px;padding:14px;font:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .18s;margin-top:4px}
.btn-login:hover:not(:disabled){opacity:.88}
.btn-login:disabled{opacity:.5;cursor:not-allowed}

/* ── Bunn-lenker ── */
.card-foot{margin-top:22px;padding-top:18px;border-top:1px solid #1a1a1a;text-align:center;color:#8c8c8c;font-size:13.5px}
.card-foot a{color:#4d8bff}
.card-foot a:hover{text-decoration:underline}

/* ── Footer ── */
.foot{border-top:1px solid #1a1a1a;padding:22px 24px;text-align:center}
.foot span{color:#555;font-size:12.5px}

@media(max-width:440px){
  .card{padding:28px 20px;border-radius:16px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-wrap">
    <a href="index.html" class="logo">BarberHQ</a>
  </div>
</nav>

<main class="main">
  <div class="card">
    <a href="index.html" class="card-logo">BarberHQ</a>
    <h1>Logg inn</h1>
    <p class="card-sub">Velkommen tilbake.</p>

    <div class="field">
      <label for="email">E-post</label>
      <input type="email" id="email" placeholder="din@epost.no"
             autocomplete="username" inputmode="email">
    </div>

    <div class="field">
      <label for="pw">Passord</label>
      <div class="pw-wrap">
        <input type="password" id="pw" placeholder="••••••••"
               autocomplete="current-password">
        <button class="pw-toggle" id="toggle-pw" type="button" aria-label="Vis passord">
          <!-- Øye åpent (vises når passord er skjult) -->
          <svg id="eye-on" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <!-- Øye lukket (vises når passord er synlig) -->
          <svg id="eye-off" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <p class="error" id="error"></p>

    <button class="btn-login" id="submit">Logg inn</button>

    <div class="card-foot">
      Har du ikke en side ennå? <a href="kom-i-gang.html">Prøv gratis</a>
    </div>
  </div>
</main>

<footer class="foot">
  <span>&copy; 2026 BarberHQ</span>
</footer>

<script>
(function () {
  var API    = 'https://api.trybarberhq.com';
  var email  = document.getElementById('email');
  var pw     = document.getElementById('pw');
  var toggle = document.getElementById('toggle-pw');
  var eyeOn  = document.getElementById('eye-on');
  var eyeOff = document.getElementById('eye-off');
  var submit = document.getElementById('submit');
  var error  = document.getElementById('error');

  // Vis/skjul passord
  toggle.addEventListener('click', function () {
    var show = pw.type === 'password';
    pw.type        = show ? 'text' : 'password';
    eyeOn.style.display  = show ? 'none'  : '';
    eyeOff.style.display = show ? ''      : 'none';
    toggle.setAttribute('aria-label', show ? 'Skjul passord' : 'Vis passord');
  });

  // Enter i felt utløser login (ingen <form>, ingen reload)
  [email, pw].forEach(function (el) {
    el.addEventListener('keydown', function (e) { if (e.key === 'Enter') login(); });
  });

  submit.addEventListener('click', login);

  function showError(msg) {
    error.textContent = msg;
    error.classList.add('show');
  }

  async function login() {
    error.classList.remove('show');
    submit.disabled     = true;
    submit.textContent  = 'Logger inn …';

    try {
      var res = await fetch(API + '/api/login', {
        method:      'POST',
        headers:     { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          email:    email.value.trim(),
          password: pw.value,
        }),
      });

      if (res.ok) {
        location.href = '/no/dashboard.html';
        return; // ikke re-enable knapp — siden byttes
      }

      var data = {};
      try { data = await res.json(); } catch (_) {}
      showError(
        res.status === 401
          ? 'Feil e-post eller passord'
          : data.error || 'Noe gikk galt, prøv igjen'
      );
    } catch (_) {
      showError('Noe gikk galt, prøv igjen');
    } finally {
      submit.disabled    = false;
      submit.textContent = 'Logg inn';
    }
  }
}());
</script>
</body>
</html>
