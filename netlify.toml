# BarberHQ — ruting og proxy.
# Rekkefølge er kritisk: første match vinner.

# 0. Interne utkast/notater — versjonert i git, men ALDRI offentlig.
#    Publish-dir er repo-roten, så filer i _utkast/ ville ellers servert som råtekst.
#    force = true evalueres FØR statisk fil-serving → svar 404 (body = no/-forsiden),
#    aldri utkastets innhold. _utkast/ er to segmenter → /:slug-proxyen rører den ikke.
[[redirects]]
  from = "/_utkast/*"
  to = "/no/"
  status = 404
  force = true

# 1. Språk-redirects (kun /, med Accept-Language-betingelse)
[[redirects]]
  from = "/"
  to = "/sv/"
  status = 302
  conditions = {Language = ["sv"]}

[[redirects]]
  from = "/"
  to = "/da/"
  status = 302
  conditions = {Language = ["da"]}

[[redirects]]
  from = "/"
  to = "/no/"
  status = 302
  conditions = {Language = ["nb", "nn", "no"]}

# Resten av verden → engelsk.
[[redirects]]
  from = "/"
  to = "/en/"
  status = 302

# 2. Bare språk-koder uten trailing slash → redirect til katalog.
#    Hindrer at /no, /sv, /da, /en fanges av proxy-regelen under.
[[redirects]]
  from = "/no"
  to = "/no/"
  status = 301

[[redirects]]
  from = "/sv"
  to = "/sv/"
  status = 301

[[redirects]]
  from = "/da"
  to = "/da/"
  status = 301

[[redirects]]
  from = "/en"
  to = "/en/"
  status = 301

# 3. API- og book-proxy → Railway backend.
#    Må komme FØR /:slug-regelen — Netlify tar første treff.
[[redirects]]
  from = "/api/*"
  to = "https://api.trybarberhq.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/book/*"
  to = "https://api.trybarberhq.com/book/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/avmeld/*"
  to = "https://api.trybarberhq.com/avmeld/:splat"
  status = 200
  force = true

# 4. Proxy: ett-segment-stier → backend (barbersider).
#    :slug matcher kun ett segment — /no/priser (to segmenter) fanges aldri.
#    Status 200 = rewrite/proxy, URL forblir trybarberhq.com i adressefeltet.
#    force = false (default): eksisterende filer i publish-dir serves direkte.
[[redirects]]
  from = "/:slug"
  to = "https://api.trybarberhq.com/:slug"
  status = 200
  force = false

# 5. noindex for sv/da/en (bevisst utdaterte — ventes til oversettelsesfasen).
#    no/ nevnes ALDRI → forblir indekserbar. Tillater crawling og sender noindex,
#    så Google leser headeren og holder de tre språkene ute av indeksen.
#    Fjern språkets blokk-par når det er ferdig oversatt ved lansering.
#    Splat + bar-katalog per språk (belte-og-seler: /sv/ uten filnavn dekkes også).
[[headers]]
  for = "/sv/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/sv/"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/da/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/da/"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/en/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/en/"
  [headers.values]
    X-Robots-Tag = "noindex"
