# BarberHQ — ruting og proxy.
# Rekkefølge er kritisk: første match vinner.

# Publish = kun site/. Selve siden (no/ sv/ da/ en/) bor der; alt annet på repo-roten
# (CLAUDE.md, tools/, .claude/, _utkast/, assets/, config) ligger UTENFOR publish og kan
# strukturelt ikke serveres. Dette er PRIMÆRVERNET mot lekkasje av interne filer.
# Bakgrunn: redirect-guards alene er IKKE vanntette — Netlifys fil-serving er
# case-INSENSITIV (serverer CLAUDE.md for /Claude.md, /CLAUDE.MD, …) mens redirect-`from`
# er case-SENSITIV, så case-varianter omgår enhver enumerert guard (empirisk bekreftet
# mot prod). Kun «ikke i publish» lukker hele klassen.
[build]
  publish = "site"

# 0. Guards på interne stier — SEKUNDÆRT nett bak publish=site (defense-in-depth,
#    fanger eksakt-case hvis publish-settingen noen gang skulle ryke). force = true
#    evalueres før statisk fil-serving → 404. Lowercase `/claude.md` er den funksjonelle
#    varianten (se case-notatet over); `/CLAUDE.md` er belte-og-seler.
[[redirects]]
  from = "/claude.md"
  to = "/no/"
  status = 404
  force = true

[[redirects]]
  from = "/CLAUDE.md"
  to = "/no/"
  status = 404
  force = true

[[redirects]]
  from = "/tools/*"
  to = "/no/"
  status = 404
  force = true

[[redirects]]
  from = "/.claude/*"
  to = "/no/"
  status = 404
  force = true

[[redirects]]
  from = "/_utkast/*"
  to = "/no/"
  status = 404
  force = true

# 1. Språk-redirects (kun /, med Accept-Language-betingelse)
[[redirects]]
  from = "/"
  to = "/sv/"
  status = 302
  conditions = {Language = ["sv"]}

[[redirects]]
  from = "/"
  to = "/da/"
  status = 302
  conditions = {Language = ["da"]}

[[redirects]]
  from = "/"
  to = "/no/"
  status = 302
  conditions = {Language = ["nb", "nn", "no"]}

# Resten av verden → engelsk.
[[redirects]]
  from = "/"
  to = "/en/"
  status = 302

# 2. Bare språk-koder uten trailing slash → redirect til katalog.
#    Hindrer at /no, /sv, /da, /en fanges av proxy-regelen under.
[[redirects]]
  from = "/no"
  to = "/no/"
  status = 301

[[redirects]]
  from = "/sv"
  to = "/sv/"
  status = 301

[[redirects]]
  from = "/da"
  to = "/da/"
  status = 301

[[redirects]]
  from = "/en"
  to = "/en/"
  status = 301

# 3. API- og book-proxy → Railway backend.
#    Må komme FØR /:slug-regelen — Netlify tar første treff.
[[redirects]]
  from = "/api/*"
  to = "https://api.trybarberhq.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/book/*"
  to = "https://api.trybarberhq.com/book/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/avmeld/*"
  to = "https://api.trybarberhq.com/avmeld/:splat"
  status = 200
  force = true

# 4. Proxy: ett-segment-stier → backend (barbersider).
#    :slug matcher kun ett segment — /no/priser (to segmenter) fanges aldri.
#    Status 200 = rewrite/proxy, URL forblir trybarberhq.com i adressefeltet.
#    force = false (default): eksisterende filer i publish-dir serves direkte.
[[redirects]]
  from = "/:slug"
  to = "https://api.trybarberhq.com/:slug"
  status = 200
  force = false

# 5. noindex for sv/da/en (bevisst utdaterte — ventes til oversettelsesfasen).
#    no/ nevnes ALDRI → forblir indekserbar. Tillater crawling og sender noindex,
#    så Google leser headeren og holder de tre språkene ute av indeksen.
#    Fjern språkets blokk-par når det er ferdig oversatt ved lansering.
#    Splat + bar-katalog per språk (belte-og-seler: /sv/ uten filnavn dekkes også).
[[headers]]
  for = "/sv/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/sv/"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/da/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/da/"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/en/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/en/"
  [headers.values]
    X-Robots-Tag = "noindex"

# 6. noindex på interne stier — belte-og-seler bak guardene i seksjon 0.
#    Hvis en guard-regel ryker ved en senere netlify.toml-endring og fila serveres
#    med 200, sikrer denne headeren at søkemotorer ikke indekserer den likevel.
#    /claude.md i lowercase (samme case-felle som guarden — se seksjon 0).
[[headers]]
  for = "/claude.md"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/CLAUDE.md"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/tools/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/.claude/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/_utkast/*"
  [headers.values]
    X-Robots-Tag = "noindex"
