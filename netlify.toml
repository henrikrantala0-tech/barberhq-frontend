# BarberHQ — ruting og proxy.
# Rekkefølge er kritisk: første match vinner.

# 0. Interne filer — versjonert i git, men ALDRI offentlig.
#    Publish-dir er repo-roten, så disse ville ellers servert som råtekst/kildekode.
#    force = true evalueres FØR statisk fil-serving → svar 404 (body = no/-forsiden),
#    aldri filens innhold.
#
#    ⚠️ CASE-FELLE (verifisert mot Netlify-docs/staff): statisk fil-serving er
#    case-INSENSITIV — Netlify normaliserer stien til lowercase, så CLAUDE.md serveres
#    på /claude.md. Redirect-`from` er derimot case-SENSITIV. Derfor MÅ guarden matche
#    den normaliserte (lowercase) stien: `/claude.md` er den funksjonelle regelen,
#    `/CLAUDE.md` er belte-og-seler. tools/ .claude/ _utkast/ er allerede lowercase.
[[redirects]]
  from = "/claude.md"
  to = "/no/"
  status = 404
  force = true

[[redirects]]
  from = "/CLAUDE.md"
  to = "/no/"
  status = 404
  force = true

[[redirects]]
  from = "/tools/*"
  to = "/no/"
  status = 404
  force = true

[[redirects]]
  from = "/.claude/*"
  to = "/no/"
  status = 404
  force = true

[[redirects]]
  from = "/_utkast/*"
  to = "/no/"
  status = 404
  force = true

# 1. Språk-redirects (kun /, med Accept-Language-betingelse)
[[redirects]]
  from = "/"
  to = "/sv/"
  status = 302
  conditions = {Language = ["sv"]}

[[redirects]]
  from = "/"
  to = "/da/"
  status = 302
  conditions = {Language = ["da"]}

[[redirects]]
  from = "/"
  to = "/no/"
  status = 302
  conditions = {Language = ["nb", "nn", "no"]}

# Resten av verden → engelsk.
[[redirects]]
  from = "/"
  to = "/en/"
  status = 302

# 2. Bare språk-koder uten trailing slash → redirect til katalog.
#    Hindrer at /no, /sv, /da, /en fanges av proxy-regelen under.
[[redirects]]
  from = "/no"
  to = "/no/"
  status = 301

[[redirects]]
  from = "/sv"
  to = "/sv/"
  status = 301

[[redirects]]
  from = "/da"
  to = "/da/"
  status = 301

[[redirects]]
  from = "/en"
  to = "/en/"
  status = 301

# 3. API- og book-proxy → Railway backend.
#    Må komme FØR /:slug-regelen — Netlify tar første treff.
[[redirects]]
  from = "/api/*"
  to = "https://api.trybarberhq.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/book/*"
  to = "https://api.trybarberhq.com/book/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/avmeld/*"
  to = "https://api.trybarberhq.com/avmeld/:splat"
  status = 200
  force = true

# 4. Proxy: ett-segment-stier → backend (barbersider).
#    :slug matcher kun ett segment — /no/priser (to segmenter) fanges aldri.
#    Status 200 = rewrite/proxy, URL forblir trybarberhq.com i adressefeltet.
#    force = false (default): eksisterende filer i publish-dir serves direkte.
[[redirects]]
  from = "/:slug"
  to = "https://api.trybarberhq.com/:slug"
  status = 200
  force = false

# 5. noindex for sv/da/en (bevisst utdaterte — ventes til oversettelsesfasen).
#    no/ nevnes ALDRI → forblir indekserbar. Tillater crawling og sender noindex,
#    så Google leser headeren og holder de tre språkene ute av indeksen.
#    Fjern språkets blokk-par når det er ferdig oversatt ved lansering.
#    Splat + bar-katalog per språk (belte-og-seler: /sv/ uten filnavn dekkes også).
[[headers]]
  for = "/sv/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/sv/"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/da/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/da/"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/en/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/en/"
  [headers.values]
    X-Robots-Tag = "noindex"

# 6. noindex på interne stier — belte-og-seler bak guardene i seksjon 0.
#    Hvis en guard-regel ryker ved en senere netlify.toml-endring og fila serveres
#    med 200, sikrer denne headeren at søkemotorer ikke indekserer den likevel.
#    /claude.md i lowercase (samme case-felle som guarden — se seksjon 0).
[[headers]]
  for = "/claude.md"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/CLAUDE.md"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/tools/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/.claude/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/_utkast/*"
  [headers.values]
    X-Robots-Tag = "noindex"
